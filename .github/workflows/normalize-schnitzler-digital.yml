name: Schnitzler digital Import normalisieren

on:
  push:
    paths:
      - 'import-lists/ASd_Export_Schnitzler_Tage.xml'
  workflow_dispatch:
    inputs:
      input_file:
        description: 'Name der Import-Datei in import-lists/'
        required: true
        default: 'ASd_Export_Schnitzler_Tage.xml'

jobs:
  normalize:
    name: Normalize Schnitzler digital import
    runs-on: ubuntu-latest
    steps:
    - name: Perform Checkout
      uses: actions/checkout@v4
    - name: Install Saxon
      run: |
        ./dl_saxon.sh
    - name: Transform to schnitzler-digital_tage.xml
      run: |
        java -jar saxon/saxon9he.jar -xsl:xslts/diverses/1_arthur-schnitzler-digital-zu-import-listel.xsl -s:import-lists/${{ inputs.input_file || 'ASd_Export_Schnitzler_Tage.xml' }} -o:import-lists/schnitzler-digital_tage.xml
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: Normalize schnitzler-digital_tage.xml
    - name: Trigger combine import lists workflow
      run: |
        gh workflow run combine-import-lists.yml
      env:
        GH_TOKEN: ${{ github.token }}
